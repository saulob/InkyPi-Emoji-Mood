<div style="margin-bottom:14px;">
    <div style="font-family: 'Helvetica Neue', Arial, sans-serif; font-size:1em; color:var(--text-primary); font-weight:500; background:var(--bg-secondary); padding:12px 14px; border-left:3px solid var(--border-color); border-radius:2px; line-height:1.4; max-width:100%;">
        Displays a mood emoji with an optional caption. Choose random, smart, or a fixed mood based on time and day
    </div>
</div>

<div class="form-group">
    <label for="mood" class="form-label">Mood:</label>
    <select id="mood" name="mood" class="form-input">
        <option value="random">Random</option>
        <option value="smart">Smart (time and day based)</option>
        <option value="adventure">Adventure</option>
        <option value="focus">Focus</option>
        <option value="fun">Fun</option>
        <option value="happy">Happy</option>
        <option value="love">Love</option>
        <option value="low_energy">Low Energy</option>
        <option value="neutral">Neutral</option>
        <option value="sick">Sick</option>
        <option value="stress">Stress</option>
        <option value="weird">Weird</option>
    </select>
</div>

<div class="form-group">
    <label for="showCaption" class="form-label">Show caption:</label>
    <div class="toggle-container">
        <input type="hidden" id="showCaptionValue" name="showCaption" value="true">
        <input type="checkbox" id="showCaption" class="toggle-checkbox" checked>
        <label for="showCaption" class="toggle-label"></label>
    </div>
</div>

<div class="form-group" id="languageGroup">
    <label for="language" class="form-label">Language:</label>
    <select id="language" name="language" class="form-input">
        <option value="nl">Dutch</option>
        <option value="en" selected>English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="id">Indonesian</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="pt-br">Portuguese (Brazil)</option>
        <option value="es">Spanish</option>
    </select>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const showCaptionCheckbox = document.getElementById('showCaption');
        const showCaptionValue = document.getElementById('showCaptionValue');
        const languageGroup = document.getElementById('languageGroup');
        const langEl = document.getElementById('language');

        const syncCaptionDependentFields = () => {
            const isCaptionOn = showCaptionCheckbox ? showCaptionCheckbox.checked : true;

            if (showCaptionValue) {
                showCaptionValue.value = isCaptionOn ? 'true' : 'false';
            }
            if (languageGroup) {
                languageGroup.style.display = isCaptionOn ? '' : 'none';
            }
            if (langEl) {
                // Keep the language select enabled so its value is submitted even when captions
                // are hidden. The group is visually hidden above; use aria-hidden for assistive
                // tech instead of disabling the control (disabled fields are not submitted).
                if (!isCaptionOn) {
                    langEl.setAttribute('aria-hidden', 'true');
                } else {
                    langEl.removeAttribute('aria-hidden');
                }
            }
        };

        if (showCaptionCheckbox) {
            showCaptionCheckbox.addEventListener('change', syncCaptionDependentFields);
        }

        if (typeof loadPluginSettings !== 'undefined' && loadPluginSettings && pluginSettings) {
            // Populate mood selection
            const selectedMood = pluginSettings.mood || 'random';
            document.getElementById('mood').value = selectedMood;

            // Populate language selection
            const selectedLanguage = pluginSettings.language || 'en';
            if (langEl) {
                langEl.value = selectedLanguage;
            }

            const showCaptionVal = pluginSettings.showCaption;
            const showCaptionChecked = showCaptionVal ? showCaptionVal === 'true' : true;
            if (showCaptionCheckbox && showCaptionValue) {
                showCaptionCheckbox.checked = showCaptionChecked;
                showCaptionValue.value = showCaptionChecked ? 'true' : 'false';
            }
        }

        syncCaptionDependentFields();
    });
</script>
